<style>
:root{
 --bg:#f7f3ec;--text:#2c2416;--text2:#5a4e3a;--text-muted:#6B5B4B;
 --accent:#8b5e3c;--accentL:#c4956a;--accent-red:#8B2500;
 --gold:#b8860b;--goldL:#d4a84b;--border:#d4c4a8;--border-light:#EDE8E0;
 --card:#fffdf7;--verseBg:#f0e8d8;--verseBd:#c4956a;
 --sbW:96px;--sbBg:#1e1a14;--sbText:#d4c4a8;
 --headGrad:linear-gradient(135deg,#2a2218 0%,#3d3225 50%,#2a2218 100%);--r:8px;}
*{box-sizing:border-box;}
html,body{scrollbar-width:none;-ms-overflow-style:none;}
html::-webkit-scrollbar,body::-webkit-scrollbar{display:none;width:0;height:0;}
body{margin:0;background:var(--bg);color:var(--text);font-size:20px;line-height:1.8;
 font-family:"Noto Serif TC","Songti TC",Georgia,serif;
 -webkit-user-select:none;user-select:none;}
a{text-decoration:none;color:inherit;}

/* ── 側欄 ── */
#sb{position:fixed;left:0;top:0;width:var(--sbW);height:100vh;background:var(--sbBg);
 color:var(--sbText);z-index:100;display:flex;flex-direction:column;align-items:center;
 padding:0 0 16px;overflow-y:auto;scrollbar-width:none;}
#sb::-webkit-scrollbar{display:none;}
.sb-brand{position:sticky;top:0;width:100%;font-family:"Noto Sans TC",sans-serif;
 color:var(--gold);text-align:center;line-height:1.5;
 background:linear-gradient(to bottom,var(--sbBg) 80%,rgba(30,26,20,0));
 padding:14px 4px 12px;margin-bottom:6px;z-index:5;text-decoration:none;cursor:pointer;
 transition:color .25s;display:block;border-bottom:1px solid rgba(184,134,11,.25);}
.sb-brand:hover{color:var(--goldL);}
.sb-brand-line1{display:block;font-size:11px;letter-spacing:1.5px;opacity:.78;}
.sb-brand-line2{display:block;font-size:14px;font-weight:700;letter-spacing:2.2px;color:var(--goldL);margin-top:2px;}
.sb-brand-arrow{display:block;font-size:10px;opacity:.55;margin-top:3px;letter-spacing:1px;}
.sb-nav{display:flex;flex-direction:column;gap:4px;width:100%;align-items:center;margin-top:4px;}
.sb-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 4px;
 width:84px;border-radius:10px;transition:background .2s;cursor:pointer;}
.sb-item:hover{background:rgba(184,134,11,.14);}
.sb-item.active{background:rgba(184,134,11,.9);box-shadow:0 0 14px rgba(184,134,11,.5);}
.sb-item.active .sb-circle{background:#fff;color:var(--sbBg);border-color:#fff;}
.sb-item.active .sb-label{color:#fff;}
.sb-circle{width:34px;height:34px;border-radius:50%;border:1.5px solid var(--gold);
 display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:600;
 color:var(--goldL);font-family:"Noto Serif TC",serif;}
.sb-label{font-size:12px;letter-spacing:.4px;color:var(--sbText);opacity:.88;
 font-family:"Noto Sans TC",sans-serif;text-align:center;line-height:1.25;}

/* ── 主區 ── */
.main{margin-left:var(--sbW);}
.site-hero{position:relative;background:var(--headGrad);color:#fff;text-align:center;
 padding:78px 24px 64px;overflow:hidden;}
.site-hero::before{content:"般若";position:absolute;top:50%;left:50%;
 transform:translate(-50%,-50%);font-size:300px;color:rgba(212,168,75,.04);
 font-family:"Noto Serif TC",serif;pointer-events:none;white-space:nowrap;}
.hero-title{position:relative;font-size:54px;font-weight:900;color:var(--goldL);
 letter-spacing:6px;margin:0 0 18px;}
.hero-subtitle{position:relative;font-size:21px;color:#e8dcc4;letter-spacing:2px;margin:0 0 8px;}
.hero-sub2{position:relative;font-size:17px;color:#c9b896;letter-spacing:1px;margin:0 0 22px;
 font-family:"Noto Sans TC",sans-serif;}
.hero-range{position:relative;display:inline-block;font-size:15px;color:var(--goldL);
 border:1px solid rgba(212,168,75,.5);border-radius:30px;padding:7px 22px;letter-spacing:2px;
 font-family:"Noto Sans TC",sans-serif;}

.preface{max-width:860px;margin:48px auto 8px;padding:0 28px;}
.preface-title{text-align:center;font-size:28px;color:var(--accent);font-weight:700;
 letter-spacing:4px;margin:0 0 22px;}
.preface-title::after{content:"";display:block;width:54px;height:3px;background:var(--gold);
 margin:14px auto 0;border-radius:2px;}
.preface p{font-size:18.5px;line-height:2.1;color:var(--text2);margin:0 0 16px;text-indent:2em;}

.toc-section{max-width:1100px;margin:46px auto 20px;padding:0 28px;}
.toc-title{text-align:center;font-size:34px;color:var(--accent);font-weight:700;
 letter-spacing:8px;margin:0 0 8px;}
.toc-desc{text-align:center;font-size:16px;color:var(--text-muted);margin:0 0 30px;
 font-family:"Noto Sans TC",sans-serif;letter-spacing:1px;}
.toc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px;}
.toc-card{display:flex;align-items:flex-start;gap:16px;background:var(--card);
 border:1px solid var(--border);border-radius:12px;padding:20px 22px;
 box-shadow:0 2px 8px rgba(91,58,41,.06);transition:transform .2s,box-shadow .2s,border-color .2s;}
.toc-card:hover{transform:translateY(-3px);box-shadow:0 8px 22px rgba(91,58,41,.14);border-color:var(--gold);}
.toc-num{flex:0 0 auto;width:46px;height:46px;border-radius:50%;
 background:linear-gradient(135deg,var(--gold),var(--goldL));color:#fff;
 display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;
 font-family:"Noto Serif TC",serif;}
.toc-name{font-size:20px;font-weight:700;color:var(--text);line-height:1.5;}
.toc-name small{display:block;font-size:14.5px;font-weight:400;color:var(--text-muted);
 margin-top:7px;line-height:1.6;font-family:"Noto Sans TC",sans-serif;letter-spacing:.3px;}

/* ── 章節（品）── */
.chapter{margin:30px 0;}
.ch-head{background:var(--headGrad);color:#fff;text-align:center;padding:46px 24px 40px;
 position:relative;}
.ch-head::after{content:"";display:block;width:64px;height:3px;
 background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:20px auto 0;}
.ch-num{font-size:17px;color:var(--goldL);letter-spacing:4px;margin-bottom:14px;
 font-family:"Noto Sans TC",sans-serif;}
.ch-name{font-size:36px;font-weight:900;color:#fff;letter-spacing:3px;margin:0;}
.ch-sub{font-size:16px;color:#c9b896;margin-top:14px;letter-spacing:1px;
 font-family:"Noto Sans TC",sans-serif;}
.ch-body{max-width:1000px;margin:0 auto;padding:30px 22px 10px;}

.bridge{background:linear-gradient(135deg,#fffdf5,#f5ecd8);border:1px solid var(--border);
 border-left:5px solid var(--gold);border-radius:10px;padding:20px 26px;margin:0 0 26px;
 box-shadow:0 2px 10px rgba(91,58,41,.06);}
.bridge-outro{border-left-color:var(--accentL);background:linear-gradient(135deg,#fdf8e8,#f2e6c8);
 margin-top:30px;margin-bottom:14px;}
.bridge-label{display:inline-block;font-family:"Noto Sans TC",sans-serif;font-size:12.5px;
 background:var(--gold);color:#fff;padding:4px 14px;border-radius:12px;letter-spacing:2px;margin-bottom:12px;}
.bridge-outro .bridge-label{background:var(--accent);}
.bridge p{margin:0;color:var(--text2);line-height:2.1;font-size:18px;}

.ch-frame{display:block;width:100%;border:0;background:#fffdf7;border:1px solid var(--border);
 border-radius:12px;box-shadow:0 4px 20px rgba(91,58,41,.1);margin:0 0 8px;min-height:200px;}
.next-link{display:inline-block;margin:6px 0 4px;font-family:"Noto Sans TC",sans-serif;
 font-size:16px;color:var(--accent);border:1px solid var(--border);border-radius:24px;
 padding:9px 22px;transition:background .2s,color .2s;}
.next-link:hover{background:var(--gold);color:#fff;border-color:var(--gold);}

.site-footer{background:var(--sbBg);color:#c9b896;text-align:center;padding:34px 24px;
 margin-top:40px;font-size:15px;letter-spacing:1px;font-family:"Noto Sans TC",sans-serif;line-height:1.9;}

/* ── 底部進度膠囊 ── */
.read-progress{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);z-index:120;
 background:rgba(30,26,20,.92);color:var(--gold);padding:9px 24px;border-radius:30px;
 border:1px solid rgba(184,134,11,.5);box-shadow:0 4px 18px rgba(0,0,0,.25);
 font-family:"Noto Sans TC",sans-serif;font-size:14px;letter-spacing:2px;display:flex;
 align-items:center;gap:12px;pointer-events:none;user-select:none;backdrop-filter:blur(6px);
 transition:opacity .45s ease,transform .45s ease;}
.read-progress.hide-near-end{opacity:0;transform:translateX(-50%) translateY(28px);}
.read-progress .rp-label{font-size:13px;opacity:.85;letter-spacing:4px;color:var(--goldL);}
.read-progress .rp-bar{width:148px;height:4px;background:rgba(212,196,168,.18);border-radius:2px;
 overflow:hidden;position:relative;}
.read-progress .rp-fill{position:absolute;top:0;left:0;bottom:0;
 background:linear-gradient(90deg,var(--gold),var(--goldL));width:0%;transition:width .3s;}
.read-progress .rp-pct{font-weight:600;min-width:38px;text-align:right;font-size:13px;}

#backTop{position:fixed;right:22px;bottom:22px;width:46px;height:46px;border-radius:50%;
 background:var(--gold);color:#fff;border:0;font-size:22px;cursor:pointer;z-index:120;
 display:none;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(0,0,0,.25);}
#backTop.show{display:flex;}
#sbToggle{display:none;}

@media(max-width:900px){
 #sb{transform:translateX(-100%);transition:transform .3s;}
 #sb.open{transform:translateX(0);}
 .main{margin-left:0;}
 #sbToggle{display:flex;position:fixed;left:14px;top:14px;z-index:130;width:44px;height:44px;
  border-radius:10px;background:var(--sbBg);color:var(--gold);border:0;font-size:22px;
  align-items:center;justify-content:center;cursor:pointer;}
 .hero-title{font-size:38px;}.ch-name{font-size:28px;}
 .toc-grid{grid-template-columns:1fr;}
}

<script>
/* 側欄高亮 */
var sbItems=[].slice.call(document.querySelectorAll('.sb-item'));
var chapters=[].slice.call(document.querySelectorAll('section.chapter'));
function highlight(){
  var idx=-1;
  for(var i=0;i<chapters.length;i++){
    if(chapters[i].getBoundingClientRect().top<window.innerHeight*0.35) idx=i;
  }
  sbItems.forEach(function(it,i){it.classList.toggle('active',i===idx);});
}
/* 進度膠囊 */
var rpFill=document.getElementById('rpFill'),rpPct=document.getElementById('rpPct');
function updateProgress(){
  var sh=document.documentElement.scrollHeight-window.innerHeight;
  var pct=sh>0?Math.min(100,Math.max(0,window.scrollY/sh*100)):0;
  if(rpFill)rpFill.style.width=pct+'%';
  if(rpPct)rpPct.textContent=Math.round(pct)+'%';
}
var backTop=document.getElementById('backTop');
function onScroll(){highlight();updateProgress();
  if(backTop)backTop.classList.toggle('show',window.scrollY>600);}
window.addEventListener('scroll',onScroll,{passive:true});
/* iframe 自動高度（只量 body.scrollHeight + 解除 min-height）*/
function resizeFrame(f){try{var d=f.contentDocument||f.contentWindow.document;
  if(!d||!d.body)return;d.body.style.minHeight='0';d.body.style.height='auto';
  if(d.documentElement){d.documentElement.style.minHeight='0';d.documentElement.style.height='auto';}
  var h=d.body.scrollHeight;if(h>100){f.style.height=h+'px';f.style.minHeight='0';}
}catch(e){}}
function resizeAllFrames(){document.querySelectorAll('iframe.ch-frame').forEach(resizeFrame);
  if(typeof updateProgress==='function')updateProgress();}
function setupFrame(f){var t=0;function tick(){t++;resizeFrame(f);if(t<30)setTimeout(tick,200);}
  if(f.contentDocument&&f.contentDocument.readyState==='complete'){tick();}else{f.addEventListener('load',tick);}}
document.querySelectorAll('iframe.ch-frame').forEach(setupFrame);
var rzT;window.addEventListener('resize',function(){clearTimeout(rzT);rzT=setTimeout(resizeAllFrames,200);});
/* 錨點點擊先重算高度再平滑捲動 */
document.addEventListener('click',function(e){var a=e.target;
  while(a&&a.tagName!=='A')a=a.parentElement;if(!a)return;
  var h=a.getAttribute('href');if(!h||h.charAt(0)!=='#'||h.length<2)return;
  var id=h.substring(1);var el=document.getElementById(id);if(!el)return;
  e.preventDefault();resizeAllFrames();
  setTimeout(function(){resizeAllFrames();var rect=el.getBoundingClientRect();
    var y=window.scrollY+rect.top-20;window.scrollTo({top:y,behavior:'smooth'});},60);
},true);
var _rt=0,_riv=setInterval(function(){_rt++;resizeAllFrames();if(_rt>50)clearInterval(_riv);},300);
/* sb-brand 回頂 */
var sbBrand=document.getElementById('sbBrand');
if(sbBrand)sbBrand.addEventListener('click',function(e){e.preventDefault();window.scrollTo({top:0,behavior:'smooth'});});
if(backTop)backTop.addEventListener('click',function(){window.scrollTo({top:0,behavior:'smooth'});});
/* 手機選單 */
var sbToggle=document.getElementById('sbToggle'),sb=document.getElementById('sb');
if(sbToggle)sbToggle.addEventListener('click',function(){sb.classList.toggle('open');});
/* 接近頁尾淡出 */
(function(){var cap=document.getElementById('readProgress');if(!cap)return;
  function setHide(on){cap.classList.toggle('hide-near-end',!!on);}
  var t=document.querySelector('.site-footer');if(!t)return;
  if('IntersectionObserver' in window){var io=new IntersectionObserver(function(es){
    setHide(es.some(function(e){return e.isIntersecting;}));},{rootMargin:'0px 0px -20px 0px',threshold:0.01});
    io.observe(t);}})();
/* 外層防複製 */
(function(){var blk=function(e){e.preventDefault();return false;};
['contextmenu','copy','cut','selectstart','dragstart'].forEach(function(ev){
  document.addEventListener(ev,blk,true);});
document.addEventListener('keydown',function(e){var k=e.key;
  if(e.ctrlKey&&(k==='c'||k==='C'||k==='a'||k==='A'||k==='s'||k==='S'||k==='p'||k==='P'||k==='u'||k==='U')){blk(e);}
  if(k==='F12')blk(e);if(e.ctrlKey&&e.shiftKey&&(k==='I'||k==='J'||k==='C'||k==='K')){blk(e);}},true);
})();

<script id="wy-print-intercept">
(function(){
  try{ window.print = function(){}; }catch(e){}
  document.addEventListener("keydown", function(e){
    if((e.metaKey||e.ctrlKey) && (e.key==="p"||e.key==="P"||e.keyCode===80)){
      e.preventDefault(); e.stopPropagation();
      return false;
    }
  }, true);
})();
</script>
<script id="wy-decoder">
(function(){
  if(!window.__wyReady) return;
  var KEY = "wy-dazhidulun-93-v1";
  function _dec(b64){
    try{
      var raw = atob(b64);
      var bytes = new Uint8Array(raw.length);
      for(var i=0;i<raw.length;i++){
        bytes[i] = (raw.charCodeAt(i) ^ KEY.charCodeAt(i % KEY.length)) & 0xff;
      }
      if(typeof TextDecoder !== "undefined"){
        return new TextDecoder("utf-8").decode(bytes);
      }
      var s = "";
      for(var j=0;j<bytes.length;j++) s += String.fromCharCode(bytes[j]);
      return decodeURIComponent(escape(s));
    }catch(e){ return null; }
  }
  window.__wyReady.then(function(ok){
    if(!ok) return;
    document.querySelectorAll("iframe.ch-frame[data-c]").forEach(function(oldF){
      var decoded = _dec(oldF.getAttribute("data-c"));
      if(!decoded) return;
      var newF = document.createElement("iframe");
      for(var i=0;i<oldF.attributes.length;i++){
        var a = oldF.attributes[i];
        if(a.name === "data-c" || a.name === "srcdoc") continue;
        try{ newF.setAttribute(a.name, a.value); }catch(e){}
      }
      newF.setAttribute("srcdoc", decoded);
      try{ oldF.parentNode.replaceChild(newF, oldF); }catch(e){ return; }
      if(typeof window.setupFrame === "function"){
        try{ window.setupFrame(newF); }catch(e){}
      }
    });
    document.querySelectorAll("[data-wytext]").forEach(function(el){
      var t = _dec(el.getAttribute("data-wytext"));
      if(t === null) return;
      el.innerHTML = t;
      el.removeAttribute("data-wytext");
    });
    if(typeof window.resizeAllFrames === "function"){
      [150, 800, 2000].forEach(function(ms){
        setTimeout(function(){ try{ window.resizeAllFrames(); }catch(e){} }, ms);
      });
    }
  });
})();
</script>
